<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" fill="#ffffff"/>
  
  <!-- Crown/Shield shape with teal color -->
  <g>
    <!-- Shield body -->
    <path d="M 256 80 L 380 140 L 380 280 C 380 360 256 420 256 420 C 256 420 132 360 132 280 L 132 140 Z" fill="#4a9fb5" stroke="#4a9fb5" stroke-width="2"/>
    
    <!-- Crown points -->
    <path d="M 200 140 L 220 100 L 240 130 L 256 80 L 272 130 L 292 100 L 312 140" fill="#4a9fb5" stroke="#4a9fb5" stroke-width="2"/>
    
    <!-- Inner shield/crown design -->
    <path d="M 256 120 L 340 160 L 340 260 C 340 320 256 370 256 370 C 256 370 172 320 172 260 L 172 160 Z" fill="#ffffff" stroke="#4a9fb5" stroke-width="3"/>
    
    <!-- RF text for Royal Fit -->
    <g>
      <!-- Letter R -->
      <path d="M 210 220 L 210 300 M 210 220 L 235 220 Q 245 220 245 230 Q 245 240 235 240 L 210 240 M 245 240 L 255 300" 
            stroke="#4a9fb5" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      
      <!-- Letter F -->
      <path d="M 270 220 L 270 300 M 270 220 L 295 220 M 270 255 L 290 255" 
            stroke="#4a9fb5" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    
    <!-- Decorative elements -->
    <circle cx="256" cy="160" r="8" fill="#d4af37"/>
    <circle cx="200" cy="280" r="6" fill="#d4af37"/>
    <circle cx="312" cy="280" r="6" fill="#d4af37"/>
  </g>
</svg>
