<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;display=swap');
      .text { font-family: 'Playfair Display', serif; font-weight: bold; }
    </style>
  </defs>
  <!-- Background: Royal Navy with rounded corners -->
  <rect width="512" height="512" rx="128" fill="#001f3f"/>
  
  <!-- Accent Border: Gold -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="none" stroke="#d4af37" stroke-width="24"/>
  
  <!-- Monogram: RF in Gold -->
  <text x="50%" y="50%" class="text" fill="#d4af37" font-size="280" text-anchor="middle" dy=".35em">RF</text>
</svg>