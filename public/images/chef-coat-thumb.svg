<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="ccGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF9F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E8B7D;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#ccGrad)"/>
  <!-- Chef head -->
  <circle cx="200" cy="100" r="50" fill="white"/>
  <!-- Chef coat -->
  <polygon points="200,150 120,200 120,350 280,350 280,200" fill="white" stroke="#2E8B7D" stroke-width="2"/>
  <!-- Buttons -->
  <circle cx="200" cy="200" r="8" fill="#4CAF9F"/>
  <circle cx="200" cy="240" r="8" fill="#4CAF9F"/>
  <circle cx="200" cy="280" r="8" fill="#4CAF9F"/>
  <!-- Collar -->
  <polygon points="200,150 160,150 160,200 200,190 240,200 240,150" fill="#4CAF9F"/>
  <!-- Sleeves -->
  <rect x="100" y="180" width="30" height="80" fill="white" rx="5"/>
  <rect x="270" y="180" width="30" height="80" fill="white" rx="5"/>
</svg>
