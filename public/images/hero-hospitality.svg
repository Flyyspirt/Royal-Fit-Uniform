<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF9F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E8B7D;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bgGrad)"/>
  <!-- Hotel/Restaurant illustration -->
  <rect x="100" y="150" width="500" height="400" fill="#ffffff" rx="10" opacity="0.9"/>
  <!-- Chef coat figure -->
  <circle cx="300" cy="250" r="50" fill="#4CAF9F"/>
  <rect x="250" y="310" width="100" height="150" fill="#ffffff" rx="5"/>
  <rect x="270" y="330" width="15" height="100" fill="#4CAF9F"/>
  <rect x="295" y="330" width="15" height="100" fill="#4CAF9F"/>
  <!-- Hospitality text -->
  <text x="640" y="200" font-size="64" font-weight="bold" fill="white" font-family="Arial">Hospitality Uniforms</text>
  <text x="640" y="280" font-size="32" fill="white" font-family="Arial">Premium Quality. Professional Style.</text>
  <!-- Royal Fit badge -->
  <circle cx="200" cy="100" r="60" fill="white" opacity="0.95"/>
  <text x="200" y="110" font-size="24" font-weight="bold" fill="#4CAF9F" text-anchor="middle" font-family="Arial">RF</text>
</svg>
